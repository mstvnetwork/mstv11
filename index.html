<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamZone — Live TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --card:      #1a1a26;
      --card-hover:#22223a;
      --border:    #2a2a40;
      --accent:    #e8003a;
      --accent2:   #ff6b35;
      --text:      #f0f0f8;
      --muted:     #7070a0;
      --tag:       #1e1e32;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND GLOW ── */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 500px;
      background: radial-gradient(ellipse, rgba(232,0,58,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }

    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .live-badge::before {
      content: '';
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(1.3); }
    }

    /* ── SEARCH & FILTERS ── */
    .controls {
      position: relative; z-index: 1;
      max-width: 1400px;
      margin: 2.5rem auto 0;
      padding: 0 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .search-wrap {
      flex: 1; min-width: 220px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 10px 14px 10px 42px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    .filters {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .filter-btn:hover { color: var(--text); border-color: var(--muted); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── CHANNEL COUNT ── */
    .section-header {
      position: relative; z-index: 1;
      max-width: 1400px;
      margin: 2rem auto 1rem;
      padding: 0 2rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: var(--text);
    }

    #channel-count {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── GRID ── */
    #grid {
      position: relative; z-index: 1;
      max-width: 1400px;
      margin: 0 auto 4rem;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 12px 40px rgba(232,0,58,0.18);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      position: relative;
      background: var(--surface);
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-thumb img {
      max-width: 80px;
      max-height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
      transition: transform 0.3s;
    }

    .card:hover .card-thumb img { transform: scale(1.08); }

    /* play overlay */
    .play-overlay {
      position: absolute; inset: 0;
      background: rgba(232,0,58,0.0);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: all 0.25s;
    }

    .play-overlay svg {
      width: 48px; height: 48px;
      fill: #fff;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
      transform: scale(0.8);
      transition: transform 0.25s;
    }

    .card:hover .play-overlay {
      opacity: 1;
      background: rgba(232,0,58,0.25);
    }

    .card:hover .play-overlay svg { transform: scale(1); }

    .card-body { padding: 14px 16px; }

    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    }

    .tag {
      background: var(--tag);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .tag.lang { color: var(--accent2); border-color: rgba(255,107,53,0.3); background: rgba(255,107,53,0.08); }

    /* ── WATCH MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    #modal-overlay.open { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 460px;
      width: 90%;
      text-align: center;
      position: relative;
      animation: slideUp 0.3s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); width: 32px; height: 32px;
      border-radius: 8px; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover { color: var(--text); background: var(--card-hover); }

    .modal-logo {
      width: 80px; height: 80px;
      object-fit: contain;
      margin: 0 auto 1.25rem;
      display: block;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
    }

    .modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    .modal p {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .modal-actions {
      display: flex; flex-direction: column; gap: 0.75rem;
    }

    .btn-watch {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-watch:hover {
      background: #c00030;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(232,0,58,0.4);
    }

    .btn-popup {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-popup:hover {
      background: var(--card-hover);
      border-color: var(--muted);
      box-shadow: none;
    }

    /* ── EMPTY STATE ── */
    #empty {
      display: none;
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    #empty svg { margin-bottom: 1rem; opacity: 0.3; }
    #empty h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }
    #empty p  { font-size: 0.88rem; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      position: relative; z-index: 1;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      .controls, .section-header, #grid { padding: 0 1rem; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 0.9rem; }
      .modal { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Stream<span>Zone</span></div>
    <div class="live-badge">LIVE</div>
  </header>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="text" placeholder="Search channels…" autocomplete="off"/>
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-cat="All">All</button>
    </div>
  </div>

  <!-- SECTION HEADER -->
  <div class="section-header">
    <div class="section-title">Channels</div>
    <span id="channel-count"></span>
  </div>

  <!-- GRID -->
  <div id="grid">
    <div id="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <h3>No channels found</h3>
      <p>Try a different search or filter.</p>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <img id="modal-logo" class="modal-logo" src="" alt="">
      <h2 id="modal-name"></h2>
      <p id="modal-desc">This stream opens on an external provider.<br>Choose how you'd like to watch.</p>
      <div class="modal-actions">
        <a id="btn-newtab" class="btn-watch" href="#" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Watch Now
        </a>
        <button id="btn-popup" class="btn-watch btn-popup">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/>
          </svg>
          Open in Pop-up Window
        </button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    &copy; <span id="yr"></span> StreamZone &mdash; All streams are sourced from third-party providers.
  </footer>

<script>
  // ── CONFIG ── point this to your channels.json path
  const JSON_URL = 'https://raw.githubusercontent.com/mstvnetwork/mstv11/main/channel.json';

  let allChannels = [];
  let activeCategory = 'All';
  let searchQuery = '';

  // ── FETCH DATA ──
  async function loadChannels() {
    try {
      const res = await fetch(JSON_URL);
      if (!res.ok) throw new Error('Failed to load channels.json');
      allChannels = await res.json();
      buildFilters();
      renderCards(allChannels);
    } catch (e) {
      document.getElementById('grid').innerHTML =
        `<div id="empty" style="display:block;grid-column:1/-1;text-align:center;padding:4rem;color:var(--muted)">
          <h3>Could not load channels</h3><p>${e.message}</p>
        </div>`;
    }
  }

  // ── BUILD CATEGORY FILTERS ──
  function buildFilters() {
    const cats = ['All', ...new Set(allChannels.map(c => c.category))];
    const container = document.getElementById('filters');
    container.innerHTML = '';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
      btn.dataset.cat = cat;
      btn.textContent = cat;
      btn.addEventListener('click', () => {
        activeCategory = cat;
        container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
      });
      container.appendChild(btn);
    });
  }

  // ── FILTER + SEARCH ──
  function applyFilters() {
    const q = searchQuery.toLowerCase();
    const filtered = allChannels.filter(c => {
      const matchCat = activeCategory === 'All' || c.category === activeCategory;
      const matchQ   = !q ||
        c.name.toLowerCase().includes(q) ||
        c.language.toLowerCase().includes(q) ||
        (c.tags || []).some(t => t.toLowerCase().includes(q));
      return matchCat && matchQ;
    });
    renderCards(filtered);
  }

  // ── RENDER CARDS ──
  function renderCards(channels) {
    const grid  = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const count = document.getElementById('channel-count');

    // remove old cards (keep #empty)
    grid.querySelectorAll('.card').forEach(el => el.remove());

    count.textContent = channels.length
      ? `${channels.length} channel${channels.length > 1 ? 's' : ''}`
      : '';

    if (!channels.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    channels.forEach((ch, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.04}s`;
      card.innerHTML = `
        <div class="card-thumb">
          <img src="${ch.logo}" alt="${ch.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22 viewBox=%220 0 24 24%22 fill=%22%23333%22><rect width=%2224%22 height=%2224%22 rx=%224%22/><text x=%2212%22 y=%2216%22 font-size=%228%22 text-anchor=%22middle%22 fill=%22%23888%22>TV</text></svg>'">
          <div class="play-overlay">
            <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        </div>
        <div class="card-body">
          <div class="card-name">${ch.name}</div>
          <div class="card-meta">
            <span class="tag">${ch.category}</span>
            <span class="tag lang">${ch.language}</span>
          </div>
        </div>
      `;
      card.addEventListener('click', () => openModal(ch));
      grid.insertBefore(card, empty);
    });
  }

  // ── MODAL ──
  let currentChannel = null;

  function openModal(ch) {
    currentChannel = ch;
    document.getElementById('modal-logo').src  = ch.logo;
    document.getElementById('modal-logo').alt  = ch.name;
    document.getElementById('modal-name').textContent = ch.name;
    document.getElementById('btn-newtab').href = ch.url;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    currentChannel = null;
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  document.getElementById('btn-popup').addEventListener('click', () => {
    if (!currentChannel) return;
    const w = 1280, h = 720;
    const left = Math.max(0, (screen.width  - w) / 2);
    const top  = Math.max(0, (screen.height - h) / 2);
    window.open(
      currentChannel.url,
      currentChannel.name.replace(/\s+/g, '_'),
      `width=${w},height=${h},left=${left},top=${top},toolbar=no,menubar=no,scrollbars=yes,resizable=yes`
    );
    closeModal();
  });

  // ── SEARCH ──
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    applyFilters();
  });

  // ── FOOTER YEAR ──
  document.getElementById('yr').textContent = new Date().getFullYear();

  // ── INIT ──
  loadChannels();
</script>
</body>
</html>
